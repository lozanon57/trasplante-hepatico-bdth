services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: bdth
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: bdth
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  api:
    build: .
    restart: unless-stopped
    depends_on: [postgres]
    environment:
      DATABASE_URL: postgresql://bdth:${POSTGRES_PASSWORD}@postgres:5432/bdth
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      NHC_KEY: ${NHC_KEY}
      NHC_SALT: ${NHC_SALT}
      PORT: 3000
    ports:
      - "3000:3000"

volumes:
  pgdata:
